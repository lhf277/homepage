<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yukina | 迫真混音师 & Non-Professional Developer</title>
    <meta name="description" content="Yukina 的个人主页 - 迫真混音师 & Non-Professional Developer">
    <link rel="preload" as="image" href="./logo.avif" fetchpriority="high">
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/fa-solid-900.woff2" crossorigin="anonymous">
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/fa-brands-400.woff2" crossorigin="anonymous">
    <link rel="preload" as="font" type="font/woff2" href="./assets/fonts/googlesans-700.woff2" crossorigin="anonymous">
    <link rel="dns-prefetch" href="https://blog.yukina.ink">
    <style>
        :root {
            --google-blue: #0b57d0;
            --google-blue-hover: #e8f0fe;
            --google-red: #ea4335;
            --google-gray-50: #f8f9fa;
            --google-gray-100: #f1f3f4;
            --google-gray-200: #dadce0;
            --google-gray-700: #5f6368;
            --google-gray-800: #3c4043;
            --google-gray-900: #1f1f1f;
        }

        @font-face {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-style: normal;
            font-display: swap;
            src: url("./assets/fonts/fa-solid-900.woff2") format("woff2");
        }

        @font-face {
            font-family: "Font Awesome 6 Brands";
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: url("./assets/fonts/fa-brands-400.woff2") format("woff2");
        }

        @font-face {
            font-family: 'Google Sans';
            font-style: normal;
            font-weight: 400 700;
            font-display: swap;
            src: url("./assets/fonts/googlesans-700.woff2") format('woff2');
        }

        .fas, .fa-solid { font-family: "Font Awesome 6 Free"; font-weight: 900; }
        .fab, .fa-brands { font-family: "Font Awesome 6 Brands"; font-weight: 400; }
        .fas, .fab {
            font-style: normal;
            font-variant: normal;
            text-rendering: auto;
            display: inline-block;
        }

        .fa-envelope::before { content: "\f0e0"; }
        .fa-paper-plane::before { content: "\f1d8"; }
        .fa-telegram::before { content: "\f2c6"; }
        .fa-github::before { content: "\f09b"; }
        .fa-external-link-alt::before { content: "\f35d"; }
        .fa-chevron-right::before { content: "\f054"; }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Google Sans', 'Roboto', sans-serif;
            background-color: var(--google-gray-50);
            color: var(--google-gray-900);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 32px;
        }

        /* ── Header ── */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: white;
            padding: 18px 0;
            z-index: 100;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.2s;
        }

        .header.scrolled {
            border-bottom: 1px solid var(--google-gray-200);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 400;
            color: var(--google-gray-700);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--google-gray-700);
            font-weight: 500;
            font-size: 16px;
            padding: 12px 20px;
            border-radius: 22px;
            transition: background-color 0.2s, color 0.2s;
        }

        .nav-links a:hover {
            background-color: var(--google-gray-100);
            color: var(--google-gray-900);
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 4px;
        }

        .hamburger:hover { background-color: var(--google-gray-100); }

        .hamburger span {
            display: block;
            width: 20px;
            height: 2px;
            background-color: var(--google-gray-700);
            transition: all 0.2s;
        }

        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* ── Main ── */
        .main-content {
            margin-top: 88px;
            padding: 48px 0;
        }

        /* ── Hero ── */
        .hero {
            display: flex;
            gap: 48px;
            align-items: center;
            margin-bottom: 48px;
            padding: 48px 0;
            border-bottom: 1px solid var(--google-gray-200);
        }

        .avatar-container { flex: 0 0 180px; }

        .avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid var(--google-gray-200);
            background-color: white;
            padding: 4px;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .intro-text { flex: 1; }

        .name {
            font-size: 48px;
            font-weight: 400;
            color: var(--google-gray-900);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .description {
            font-size: 18px;
            color: var(--google-gray-700);
            margin-bottom: 20px;
        }

        .highlight {
            display: inline-block;
            background-color: var(--google-gray-100);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
            color: var(--google-gray-800);
            margin: 4px 10px 4px 0;
            border: 1px solid var(--google-gray-200);
        }

        /* ── Blog Section ── */
        .blog-section { padding: 0 0 48px; content-visibility: auto; contain-intrinsic-size: 500px; }

        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 400;
            color: var(--google-gray-900);
            margin-bottom: 28px;
        }

        .section-more {
            font-size: 16px;
            font-weight: 500;
            color: var(--google-blue);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 22px;
            transition: background-color 0.2s;
        }

        .section-more:hover { background-color: var(--google-blue-hover); }

        .article-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .article-card {
            background-color: white;
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--google-gray-200);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: background-color 0.2s ease;
        }

        .article-card:hover { background-color: var(--google-gray-50); }

        .article-date {
            font-size: 16px;
            color: var(--google-gray-700);
            margin-bottom: 8px;
        }

        .article-title {
            font-size: 18px;
            font-weight: 500;
            color: var(--google-gray-900);
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .article-card:hover .article-title { color: var(--google-blue); }

        .article-summary {
            font-size: 16px;
            color: var(--google-gray-700);
            line-height: 1.5;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-loading, .article-error, .article-empty {
            text-align: center;
            padding: 48px 24px;
            color: var(--google-gray-700);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .article-error { color: var(--google-red); }

        /* ── Contact Section ── */
        .contact-section { padding: 0 0 48px; content-visibility: auto; contain-intrinsic-size: 400px; }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 28px;
        }

        .contact-card {
            background-color: white;
            border-radius: 24px;
            padding: 36px 28px;
            border: 1px solid var(--google-gray-200);
            transition: background-color 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .contact-card:hover { background-color: var(--google-gray-50); }

        .contact-card .icon-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .card-email .icon-ring  { background-color: #fce8e6; color: var(--google-red); }
        .card-telegram .icon-ring { background-color: #e8f0fe; color: var(--google-blue); }
        .card-github .icon-ring { background-color: var(--google-gray-100); color: var(--google-gray-800); }

        .contact-type {
            font-size: 18px;
            font-weight: 500;
            color: var(--google-gray-700);
            margin-bottom: 10px;
        }

        .contact-info {
            font-size: 20px;
            font-weight: 400;
            color: var(--google-gray-900);
            margin-bottom: 36px;
            word-break: break-all;
        }

        .contact-action {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 28px;
            background-color: transparent;
            border: 1px solid var(--google-gray-200);
            border-radius: 100px;
            color: var(--google-blue);
            font-weight: 500;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-top: auto;
            align-self: flex-start;
        }

        .contact-action:hover {
            background-color: var(--google-blue-hover);
            border-color: transparent;
        }

        /* ── Footer ── */
        .footer {
            padding: 40px 0;
            text-align: center;
            color: var(--google-gray-700);
            font-size: 14px;
            border-top: 1px solid var(--google-gray-200);
        }

        .icp-link {
            color: var(--google-gray-700);
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        .icp-link:hover {
            color: var(--google-gray-900);
            text-decoration: underline;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: white;
                flex-direction: column;
                padding: 16px;
                border-bottom: 1px solid var(--google-gray-200);
            }

            .nav-links.active { display: flex; }

            .nav-links a { padding: 14px 20px; border-radius: 0; font-size: 16px; }

            .hamburger { display: flex; }

            .hero {
                flex-direction: column;
                text-align: center;
                gap: 28px;
            }

            .avatar-container { flex: none; }

            .name { font-size: 36px; }

            .contact-grid,
            .article-list { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .avatar { width: 140px; height: 140px; }
            .name { font-size: 32px; }
            .section-title { font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container">
            <div class="nav-container">
                <a href="#" class="logo">
                    <div class="logo-icon">
                        <img src="./logo.avif" alt="Yukina" fetchpriority="high">
                    </div>
                    Yukina
                </a>

                <ul class="nav-links" id="navLinks">
                    <li><a href="#about">个人介绍</a></li>
                    <li><a href="#blog">博客文章</a></li>
                    <li><a href="#contact">联系方式</a></li>
                </ul>

                <button class="hamburger" id="hamburger" aria-label="菜单">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main -->
    <div class="container">
        <main class="main-content">
            <section class="hero" id="about">
                <div class="avatar-container">
                    <div class="avatar">
                        <img src="./logo.avif" alt="Yukina 头像" width="172" height="172">
                    </div>
                </div>
                <div class="intro-text">
                    <h1 class="name">Yukina</h1>
                    <p class="description">迫真混音师 / 会一点 HTML</p>
                    <div>
                        <span class="highlight">18岁家里蹲</span>
                        <span class="highlight">Non-Professional Developer</span>
                    </div>
                </div>
            </section>

            <section class="blog-section" id="blog">
                <div class="section-header">
                    <h2 class="section-title">博客文章</h2>
                    <a href="https://blog.yukina.ink/" target="_blank" rel="noopener" class="section-more">
                        查看全部 <i class="fas fa-chevron-right" style="font-size:12px;"></i>
                    </a>
                </div>
                <div class="article-list" id="articleList">
                    <div class="article-loading">加载文章中...</div>
                </div>
            </section>

            <section class="contact-section" id="contact">
                <h2 class="section-title">联系信息</h2>
                <div class="contact-grid">
                    <div class="contact-card card-email">
                        <div class="icon-ring"><i class="fas fa-envelope"></i></div>
                        <h3 class="contact-type">电子邮件</h3>
                        <div class="contact-info">hi@yukina.ink</div>
                        <a href="mailto:hi@yukina.ink" class="contact-action">
                            发邮件
                        </a>
                    </div>

                    <div class="contact-card card-telegram">
                        <div class="icon-ring"><i class="fab fa-telegram"></i></div>
                        <h3 class="contact-type">Telegram</h3>
                        <div class="contact-info">@npl8sezFwTyzqehtWcVou3qBb</div>
                        <a href="https://t.me/npl8sezFwTyzqehtWcVou3qBb" target="_blank" rel="noopener" class="contact-action">
                            <i class="fas fa-external-link-alt"></i> 打开链接
                        </a>
                    </div>

                    <div class="contact-card card-github">
                        <div class="icon-ring"><i class="fab fa-github"></i></div>
                        <h3 class="contact-type">GitHub</h3>
                        <div class="contact-info">@lhf277</div>
                        <a href="https://github.com/lhf277" target="_blank" rel="noopener" class="contact-action">
                            <i class="fas fa-external-link-alt"></i> 访问主页
                        </a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <span>&copy; 2025 Yukina.</span>
            <a href="https://beian.miit.gov.cn/" class="icp-link" target="_blank" rel="noopener">豫ICP备2024075612号-1</a>
        </div>
    </footer>

    <script>
        var header = document.getElementById('header');
        var hamburger = document.getElementById('hamburger');
        var navLinks = document.getElementById('navLinks');

        hamburger.addEventListener('click', function() {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        var scrollTicking = false;
        window.addEventListener('scroll', function() {
            if (!scrollTicking) {
                requestAnimationFrame(function() {
                    header.classList.toggle('scrolled', window.scrollY > 10);
                    scrollTicking = false;
                });
                scrollTicking = true;
            }
        }, { passive: true });

        document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
            anchor.addEventListener('click', function(e) {
                if (this.getAttribute('href') === '#') return;
                e.preventDefault();
                hamburger.classList.remove('active');
                navLinks.classList.remove('active');
                var target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    window.scrollTo({ top: target.offsetTop - 88, behavior: 'smooth' });
                }
            });
        });

        function formatDate(dateStr) {
            var d = new Date(dateStr);
            return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
        }

        function stripHtml(html) {
            var tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function truncate(text, maxLen) {
            if (text.length <= maxLen) return text;
            return text.slice(0, maxLen).replace(/\s+\S*$/, '') + '...';
        }

        function renderArticles(entries) {
            var list = document.getElementById('articleList');
            if (!entries || entries.length === 0) {
                list.innerHTML = '<div class="article-empty">还没有文章</div>';
                return;
            }
            var html = '';
            var max = Math.min(entries.length, 3);
            for (var i = 0; i < max; i++) {
                var entry = entries[i];
                var title = entry.title || '(无标题)';
                var link = entry.link || 'https://blog.yukina.ink/';
                var date = entry.published ? formatDate(entry.published) : '';
                var summary = entry.summary ? truncate(stripHtml(entry.summary), 140) : '';
                if (!summary && entry.content) {
                    summary = truncate(stripHtml(entry.content), 140);
                }
                html +=
                    '<a href="' + link + '" target="_blank" rel="noopener" class="article-card">' +
                        (date ? '<span class="article-date">' + date + '</span>' : '') +
                        '<span class="article-title">' + title + '</span>' +
                        (summary ? '<span class="article-summary">' + summary + '</span>' : '') +
                    '</a>';
            }
            list.innerHTML = html;
        }

        function fetchArticles() {
            var list = document.getElementById('articleList');
            fetch('https://blog.yukina.ink/atom.xml')
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.text();
                })
                .then(function(xml) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(xml, 'text/xml');
                    var errNode = doc.querySelector('parsererror');
                    if (errNode) throw new Error('XML 解析失败');
                    var entries = [];
                    var entryNodes = doc.querySelectorAll('entry');
                    entryNodes.forEach(function(en) {
                        var titleEl = en.querySelector('title');
                        var linkEl = en.querySelector('link[href]') || en.querySelector('link');
                        var pubEl  = en.querySelector('published') || en.querySelector('updated');
                        var sumEl  = en.querySelector('summary') || en.querySelector('description');
                        var contEl = en.querySelector('content');
                        entries.push({
                            title: titleEl ? titleEl.textContent : '',
                            link: linkEl ? (linkEl.getAttribute('href') || linkEl.textContent) : '',
                            published: pubEl ? pubEl.textContent : '',
                            summary: sumEl ? sumEl.textContent : '',
                            content: contEl ? contEl.textContent : ''
                        });
                    });
                    renderArticles(entries);
                })
                .catch(function(err) {
                    list.innerHTML = '<div class="article-error">文章加载失败：' + err.message + '</div>';
                });
        }

        window.addEventListener('DOMContentLoaded', function() {
            var avatarImg = document.querySelector('.avatar img');
            avatarImg.style.opacity = '0';
            avatarImg.style.transition = 'opacity .4s ease';
            requestAnimationFrame(function() { avatarImg.style.opacity = '1'; });
            fetchArticles();
        });
    </script>
</body>
</html>
